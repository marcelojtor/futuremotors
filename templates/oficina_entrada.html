<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrada de Serviço</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Ícones -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background-color: #000;
            color: #fff;
        }

        .sidebar {
            width: 250px;
            height: 100vh;
            background: #111;
            position: fixed;
            padding-top: 20px;
        }

        .sidebar a {
            display: block;
            color: #fff;
            padding: 12px 20px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #222;
        }

        .content {
            margin-left: 250px;
            padding: 20px;
        }

        .card-form {
            background: #111;
            padding: 25px;
            border-radius: 10px;
        }

        .form-control {
            background: #222;
            border: none;
            color: #fff;
        }

        .form-control:focus {
            background: #222;
            color: #fff;
            border: 1px solid #555;
            box-shadow: none;
        }

        .btn-save {
            background: #00c853;
            border: none;
            font-weight: bold;
        }

        .btn-save:hover {
            background: #00e676;
        }

        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }

            .content {
                margin-left: 0;
            }
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <a href="/dashboard"><i class="fas fa-chart-line"></i> Dashboard</a>
    <a href="/vendas"><i class="fas fa-shopping-cart"></i> Vendas</a>
    <a href="/estoque"><i class="fas fa-box"></i> Estoque</a>
    <a href="/oficina"><i class="fas fa-tools"></i> Oficina</a>
    <a href="/financeiro_login"><i class="fas fa-dollar-sign"></i> Financeiro</a>
    <a href="#"><i class="fas fa-users"></i> Clientes</a>
    <a href="#"><i class="fas fa-bullhorn"></i> Marketing</a>
    <a href="#"><i class="fas fa-cog"></i> Configurações</a>
</div>

<!-- CONTENT -->
<div class="content">

    <h3>Entrada de Serviço</h3>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="alert alert-success mt-3">
                {{ messages[0] }}
            </div>
        {% endif %}
    {% endwith %}

    <div class="card-form mt-4">

        <form method="POST">

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label>Modelo da Moto</label>
                    <input type="text" name="modelo" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Serviço</label>
                    <input type="text" name="servico" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Data de Entrada</label>
                    <input type="date" name="data_entrada" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Data de Saída</label>
                    <input type="date" name="data_saida" class="form-control">
                </div>

                <div class="col-md-4 mb-3">
                    <label>Mão de Obra (R$)</label>
                    <input type="number" step="0.01" name="mao_obra" class="form-control">
                </div>

                <div class="col-md-4 mb-3">
                    <label>Peças</label>
                    <input type="text" name="pecas" class="form-control">
                </div>

                <div class="col-md-4 mb-3">
                    <label>Valor Total (R$)</label>
                    <input type="number" step="0.01" name="valor_total" class="form-control">
                </div>

                <div class="col-md-12 mb-3">
                    <label>Status</label>
                    <select name="status" class="form-control">
                        <option value="Pendente">Pendente</option>
                        <option value="Aprovado">Aprovado</option>
                        <option value="Finalizado">Finalizado</option>
                    </select>
                </div>

            </div>

            <button type="submit" class="btn btn-save w-100">
                <i class="fas fa-save"></i> Registrar Serviço
            </button>

        </form>

    </div>

</div>

</body>
</html>
