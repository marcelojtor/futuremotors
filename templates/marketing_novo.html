<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Nova Campanha</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #0b0b0b;
            color: white;
        }

        .sidebar {
            width: 240px;
            height: 100vh;
            position: fixed;
            background: #111;
            padding: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 10px;
            margin-bottom: 5px;
            text-decoration: none;
            border-radius: 8px;
        }

        .sidebar a:hover {
            background: #1f1f1f;
        }

        .content {
            margin-left: 260px;
            padding: 20px;
        }

        .card-dark {
            background: #161616;
            border-radius: 15px;
            padding: 20px;
        }

        input, select {
            background-color: #1c1c1c !important;
            color: white !important;
            border: none !important;
        }

        .btn-primary {
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h4>⚡ Sistema</h4>
    <a href="/dashboard">Dashboard</a>
    <a href="/vendas">Vendas</a>
    <a href="/estoque">Estoque</a>
    <a href="/oficina">Oficina</a>
    <a href="/clientes">Clientes</a>
    <a href="/marketing">Marketing</a>
    <a href="/financeiro">Financeiro</a>
    <a href="/logout">Sair</a>
</div>

<div class="content">

    <h2 class="mb-4">📣 Nova Campanha</h2>

    <div class="card-dark">

        <form method="POST">

            <div class="mb-3">
                <label>Canal</label>
                <select name="canal" class="form-control" required>
                    <option value="">Selecione</option>
                    <option>Instagram</option>
                    <option>Facebook</option>
                    <option>Google Ads</option>
                    <option>WhatsApp</option>
                    <option>Outro</option>
                </select>
            </div>

            <div class="mb-3">
                <label>Valor Investido</label>
                <input type="number" step="0.01" name="valor_investido" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Retorno Obtido</label>
                <input type="number" step="0.01" name="retorno" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Data</label>
                <input type="date" name="data" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary">Salvar Campanha</button>

        </form>

    </div>

</div>

</body>
</html>
