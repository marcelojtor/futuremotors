<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Sistema{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background-color: #0b0b0b;
            color: white;
            margin: 0;
        }

        .sidebar {
            width: 240px;
            height: 100vh;
            position: fixed;
            background: #111;
            padding: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 10px;
            margin-bottom: 5px;
            text-decoration: none;
            border-radius: 8px;
        }

        .sidebar a:hover {
            background: #1f1f1f;
        }

        .content {
            margin-left: 260px;
            padding: 20px;
        }

        .card-dark {
            background: #161616;
            border-radius: 15px;
            padding: 20px;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h4>⚡ Sistema</h4>

    <a href="{{ url_for('dashboard') }}">Dashboard</a>
    <a href="{{ url_for('vendas') }}">Vendas</a>
    <a href="{{ url_for('estoque') }}">Estoque</a>
    <a href="{{ url_for('oficina') }}">Oficina</a>
    <a href="{{ url_for('clientes') }}">Clientes</a>
    <a href="{{ url_for('marketing') }}">Marketing</a>
    <a href="{{ url_for('financeiro') }}">Financeiro</a>

    <hr>

    <a href="{{ url_for('logout') }}">Sair</a>
</div>

<div class="content">
    {% block content %}{% endblock %}
</div>

</body>
</html>
