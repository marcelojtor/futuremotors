<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Ícones -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background-color: #000;
            color: #fff;
        }

        .sidebar {
            width: 250px;
            height: 100vh;
            background: #111;
            position: fixed;
            padding-top: 20px;
        }

        .sidebar a {
            display: block;
            color: #fff;
            padding: 12px 20px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #222;
        }

        .content {
            margin-left: 250px;
            padding: 20px;
        }

        .card-produto {
            background: #111;
            border-radius: 10px;
            overflow: hidden;
            transition: 0.3s;
        }

        .card-produto:hover {
            transform: scale(1.03);
        }

        .card-produto img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .card-body {
            padding: 15px;
        }

        .btn-add {
            background: #00c853;
            border: none;
            font-weight: bold;
        }

        .btn-add:hover {
            background: #00e676;
        }

        .form-control {
            background: #222;
            border: none;
            color: #fff;
        }

        .form-control:focus {
            background: #222;
            color: #fff;
            border: 1px solid #555;
            box-shadow: none;
        }

        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }

            .content {
                margin-left: 0;
            }
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <a href="/dashboard"><i class="fas fa-chart-line"></i> Dashboard</a>
    <a href="/vendas"><i class="fas fa-shopping-cart"></i> Vendas</a>
    <a href="/estoque"><i class="fas fa-box"></i> Estoque</a>
    <a href="#"><i class="fas fa-tools"></i> Oficina</a>
    <a href="/financeiro_login"><i class="fas fa-dollar-sign"></i> Financeiro</a>
    <a href="#"><i class="fas fa-users"></i> Clientes</a>
    <a href="#"><i class="fas fa-bullhorn"></i> Marketing</a>
    <a href="#"><i class="fas fa-cog"></i> Configurações</a>
</div>

<!-- CONTENT -->
<div class="content">

    <!-- TOPO -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>Estoque</h3>

        <a href="/estoque/cadastrar" class="btn btn-add">
            <i class="fas fa-plus"></i> Novo Produto
        </a>
    </div>

    <!-- FILTRO -->
    <form method="GET" class="mb-4">
        <div class="row">
            <div class="col-md-4">
                <input type="text" name="modelo" class="form-control" placeholder="Buscar por modelo...">
            </div>
            <div class="col-md-2">
                <button class="btn btn-primary w-100">Filtrar</button>
            </div>
        </div>
    </form>

    <!-- GRID -->
    <div class="row">

        {% for produto in produtos %}
        <div class="col-md-3 mb-4">
            <div class="card-produto">

                <img src="{{ produto.imagem or '/imagens/default.png' }}">

                <div class="card-body">
                    <h5>{{ produto.modelo }}</h5>
                    <p class="text-success">R$ {{ produto.valor }}</p>

                    <small>
                        {{ produto.bateria }}<br>
                        {{ produto.autonomia }}
                    </small>

                    <a href="/produto/{{ produto.id }}" class="btn btn-outline-light btn-sm w-100 mt-2">
                        Ver Detalhes
                    </a>
                </div>

            </div>
        </div>
        {% endfor %}

    </div>

</div>

</body>
</html>
