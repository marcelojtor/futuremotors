<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sistema</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Ícones -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
        }

        .sidebar {
            width: 250px;
            height: 100vh;
            background: #111;
            position: fixed;
            padding-top: 20px;
            transition: all 0.3s;
        }

        .sidebar a {
            display: block;
            color: #fff;
            padding: 12px 20px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #222;
        }

        .sidebar i {
            margin-right: 10px;
        }

        .content {
            margin-left: 250px;
            padding: 20px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .menu-toggle {
            display: none;
            font-size: 22px;
            cursor: pointer;
        }

        .user-menu {
            position: relative;
            display: inline-block;
        }

        .dropdown-menu-custom {
            display: none;
            position: absolute;
            right: 0;
            background: #111;
            border-radius: 6px;
            overflow: hidden;
        }

        .dropdown-menu-custom a {
            display: block;
            padding: 10px;
            color: #fff;
            text-decoration: none;
        }

        .dropdown-menu-custom a:hover {
            background: #222;
        }

        .card-dashboard {
            background: #111;
            border-radius: 10px;
            padding: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .card-dashboard:hover {
            background: #1a1a1a;
            transform: scale(1.02);
        }

        @media (max-width: 768px) {
            .sidebar {
                left: -250px;
            }

            .sidebar.active {
                left: 0;
            }

            .content {
                margin-left: 0;
            }

            .menu-toggle {
                display: block;
            }
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <a href="/dashboard"><i class="fas fa-chart-line"></i> Dashboard</a>
    <a href="/vendas"><i class="fas fa-shopping-cart"></i> Vendas</a>
    <a href="/estoque"><i class="fas fa-box"></i> Estoque</a>
    <a href="/oficina"><i class="fas fa-tools"></i> Oficina</a>
    <a href="/financeiro_login"><i class="fas fa-dollar-sign"></i> Financeiro</a>
    <a href="/clientes"><i class="fas fa-users"></i> Clientes</a>
    <a href="#"><i class="fas fa-bullhorn"></i> Marketing</a>
    <a href="#"><i class="fas fa-cog"></i> Configurações</a>
</div>

<div class="content">

    <div class="topbar">
        <span class="menu-toggle" onclick="toggleMenu()">
            <i class="fas fa-bars"></i>
        </span>

        <h4>Dashboard</h4>

        <div class="user-menu">
            <span onclick="toggleDropdown()">
                {{ user }} - {{ role }} <i class="fas fa-ellipsis-v"></i>
            </span>

            <div class="dropdown-menu-custom" id="dropdown">
                <a href="#">Configurações</a>
                <a href="/logout">Logout</a>
            </div>
        </div>
    </div>

    <div class="row g-4">

        <div class="col-md-3">
            <div class="card-dashboard" onclick="gerarGrafico('dia')">
                <h6>Vendas no Dia</h6>
                <h3>R$ 1.200</h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card-dashboard" onclick="gerarGrafico('semana')">
                <h6>Vendas na Semana</h6>
                <h3>R$ 8.500</h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card-dashboard" onclick="gerarGrafico('mes')">
                <h6>Vendas no Mês</h6>
                <h3>R$ 32.000</h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card-dashboard" onclick="gerarGrafico('estoque')">
                <h6>Estoque Atual</h6>
                <h3>45</h3>
            </div>
        </div>

    </div>

    <div class="mt-5">
        <canvas id="grafico"></canvas>
    </div>

</div>

<script>
    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
    }

    function toggleDropdown() {
        let menu = document.getElementById('dropdown');
        menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    }

    let chart;

    function gerarGrafico(tipo) {

        let dados = {
            labels: [],
            valores: []
        };

        if (tipo === 'dia') {
            dados.labels = ['09h', '12h', '15h', '18h'];
            dados.valores = [200, 400, 300, 300];
        }

        if (tipo === 'semana') {
            dados.labels = ['Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sab'];
            dados.valores = [1000, 1500, 1200, 1800, 2000, 1000];
        }

        if (tipo === 'mes') {
            dados.labels = ['Sem 1', 'Sem 2', 'Sem 3', 'Sem 4'];
            dados.valores = [8000, 7000, 9000, 8000];
        }

        if (tipo === 'estoque') {
            dados.labels = ['Disponível', 'Vendido'];
            dados.valores = [45, 30];
        }

        if (chart) {
            chart.destroy();
        }

        let ctx = document.getElementById('grafico').getContext('2d');

        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: dados.labels,
                datasets: [{
                    label: 'Dados',
                    data: dados.valores
                }]
            }
        });
    }
</script>

</body>
</html>
